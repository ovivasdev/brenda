<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Museo B.A.P. Abtao</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  
     <div id="main-header-placeholder"></div>

    <main>

<section class="page-intro">
        <h1>Galería Histórica</h1>
        <p>Un recorrido visual por las entrañas del "Silencioso Victoria".</p>
    </section>

    <main class="galeria-wrapper">
        <div class="galeria-nav">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="exterior">Exterior</button>
            <button class="filter-btn" data-filter="interior">Interior</button>
            <button class="filter-btn" data-filter="tripulacion">Tripulación</button>
        </div>

        <div class="galeria-masonry">
            
            <div class="galeria-card exterior">
                <img src="contacto/1.jpg" alt="B.A.P. Abtao desde el muelle">
                <div class="card-caption">
                    <span>Vista desde el Muelle</span>
                </div>
            </div>

            <div class="galeria-card interior">
                <img src="contacto/2.jpeg" alt="Compartimento de torpedos">
                <div class="card-caption">
                    <span>Sala de Torpedos</span>
                </div>
            </div>

            <div class="galeria-card tripulacion">
                <img src="contacto/3.jpg" alt="Históricos submarinistas">
                <div class="card-caption">
                    <span>Héroes Navales</span>
                </div>
            </div>

            </div>



    </main>

<div id="main-footer-placeholder"></div>

    <script src="script.js"></script>

</body>
</html>
